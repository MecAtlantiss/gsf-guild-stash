<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnold's Gym — Unique Stash Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0b08;
    --surface:   #151210;
    --border:    #3a2e1e;
    --gold:      #c8973a;
    --gold-dim:  #7a5a20;
    --gold-glow: #e8b84b;
    --green-lit: #4caf72;
    --text:      #c9b99a;
    --text-dim:  #6b5a42;
    --unique:    #af6025;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 17px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, #1e1508 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8973a' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .guild-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    color: var(--gold-glow);
    letter-spacing: 0.08em;
    text-shadow: 0 0 40px #c8973a55, 0 2px 4px #000;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 15px;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 48px;
    padding: 28px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
    display: block;
  }
  .stat-label {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
    display: block;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .progress-track {
    height: 6px;
    background: #1e1a12;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-glow));
    border-radius: 3px;
    transition: width 0.6s ease;
    box-shadow: 0 0 10px var(--gold-dim);
  }
  .progress-label {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Controls ── */
  .controls-wrap {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .controls-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 80px;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap::before {
    content: '⚔';
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dim);
    font-size: 14px;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    padding: 10px 12px 10px 34px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--gold-dim); }
  input[type="search"]::placeholder { color: var(--text-dim); }

  .filter-btn {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1508; }

  /* ── Table ── */
  .table-wrap {
    max-width: 900px;
    margin: 20px auto 60px;
    padding: 0 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 16px;
  }
  thead tr { border-bottom: 1px solid var(--gold-dim); }
  th {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--gold); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: var(--gold-glow); }

  tbody tr {
    border-bottom: 1px solid #1e1a12;
    transition: background 0.15s;
  }
  tbody tr:hover { background: #181410; }

  td { padding: 11px 14px; vertical-align: middle; }

  .name-cell { color: var(--unique); font-weight: 600; font-size: 17px; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .badge-yes { background: #0f2b18; border: 1px solid #2a6b3a; color: var(--green-lit); }
  .badge-no  { background: #1e0e0e; border: 1px solid #4a1818; color: #b05050; }

  /* ★ Important tag next to name */
  .tag-imp {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 700;
    background: #1e1000;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    margin-left: 8px;
    vertical-align: middle;
    line-height: 1.6;
  }

  /* Source cell */
  .source-cell {
    color: var(--text-dim);
    font-size: 14px;
    font-style: italic;
  }

  .first-seen-cell {
    color: var(--text-dim);
    font-size: 14px;
    font-style: italic;
  }

  .status-msg {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 18px;
  }
  .last-updated {
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    padding: 0 24px 16px;
    letter-spacing: 0.04em;
  }

  @media (max-width: 640px) {
    th:nth-child(4), td:nth-child(4) { display: none; }
    .stats-bar { gap: 28px; }
    .stat-value { font-size: 24px; }
  }
  @media (max-width: 480px) {
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="guild-name">Arnold's Gym</div>
  <div class="subtitle">GSF Unique Hunt — Stash Tracker</div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-value" id="stat-total">—</span>
    <span class="stat-label">Total Uniques</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="stat-owned">—</span>
    <span class="stat-label">Ever Seen</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="stat-missing">—</span>
    <span class="stat-label">Missing</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="stat-pct">—</span>
    <span class="stat-label">Completion</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label">Overall Progress</div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" style="margin-top:16px;">&#9733; Important Progress</div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill-imp" style="width:0%; background: linear-gradient(90deg, #7a5a20, #e8b84b); box-shadow: 0 0 10px #c8973a88;"></div>
  </div>
  <div id="imp-progress-counts" style="text-align:center;font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:0.04em;font-style:italic;"></div>
</div>

<div class="controls-wrap">
  <!-- Row 1: search -->
  <div class="controls-row">
    <div class="search-wrap">
      <input type="search" id="search" placeholder="Search uniques…" autocomplete="off">
    </div>
  </div>

  <!-- Row 2: Have / Don't Have filter -->
  <div class="controls-row">
    <span class="controls-label">Status:</span>
    <button class="filter-btn active" data-have="all">All</button>
    <button class="filter-btn" data-have="1">Have</button>
    <button class="filter-btn" data-have="0">Don't Have</button>
  </div>

  <!-- Row 3: Important filter -->
  <div class="controls-row">
    <span class="controls-label">★ Priority:</span>
    <button class="filter-btn" data-imp="all">All</button>
    <button class="filter-btn active" data-imp="1">Important Only</button>
    <button class="filter-btn" data-imp="0">Non-Important Only</button>
  </div>
</div>

<div class="table-wrap">
  <div id="status" class="status-msg">Loading stash data…</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th data-col="name">Unique Name <span class="sort-arrow">↕</span></th>
        <th data-col="have">Status <span class="sort-arrow">↕</span></th>
        <th data-col="source">Source <span class="sort-arrow">↕</span></th>
        <th data-col="first_seen">First Seen <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const MASTER_CSV    = "./guild_stash_master.csv";
const IMPORTANT_CSV = "./important_uniques.csv";

let allRows    = [];
let sortCol    = "name";
let sortDir    = 1;
let filterHave = "all";
let filterImp  = "1";

// ── CSV helpers ───────────────────────────────────────────
async function fetchCSV(path) {
  const resp = await fetch(path + "?t=" + Date.now());
  if (!resp.ok) throw new Error(`HTTP ${resp.status} fetching ${path}`);
  return resp.text();
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur);
    const row = {};
    headers.forEach((h, i) => row[h] = (cols[i] || "").trim());
    return row;
  }).filter(r => r["Unique Name"]);
}

// ── Render ────────────────────────────────────────────────
function renderTable() {
  const query = document.getElementById("search").value.toLowerCase();
  let rows = [...allRows];

  if (filterHave !== "all") rows = rows.filter(r => r["Ever Seen"]  === filterHave);
  if (filterImp  !== "all") rows = rows.filter(r => r["_important"] === filterImp);
  if (query)                rows = rows.filter(r => r["Unique Name"].toLowerCase().includes(query));

  rows.sort((a, b) => {
    let av, bv;
    if      (sortCol === "have")       { av = a["Ever Seen"];   bv = b["Ever Seen"];   }
    else if (sortCol === "source")     { av = a["_source"];     bv = b["_source"];     }
    else if (sortCol === "first_seen") { av = a["First Seen"];  bv = b["First Seen"];  }
    else                               { av = a["Unique Name"]; bv = b["Unique Name"]; }
    if (av < bv) return -sortDir;
    if (av > bv) return  sortDir;
    return 0;
  });

  const tbody = document.getElementById("tbody");

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-dim);font-style:italic;">No uniques match your filters.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const have   = r["Ever Seen"] === "1";
    const imp    = r["_important"] === "1";
    const source = r["_source"] || "";

    const badge  = have
      ? `<span class="badge badge-yes">✓ Have</span>`
      : `<span class="badge badge-no">✗ Missing</span>`;
    const impTag = imp ? `<span class="tag-imp">★ Important</span>` : "";
    const srcCell  = `<td class="source-cell">${source || "—"}</td>`;
    const fsCell   = r["First Seen"]
      ? `<td class="first-seen-cell">${r["First Seen"]}</td>`
      : `<td class="first-seen-cell">—</td>`;

    return `<tr>
      <td class="name-cell">${r["Unique Name"]}${impTag}</td>
      <td>${badge}</td>
      ${srcCell}
      ${fsCell}
    </tr>`;
  }).join("");
}

function updateStats() {
  const total = allRows.length;
  const owned = allRows.filter(r => r["Ever Seen"] === "1").length;
  const pct   = total ? Math.round(owned / total * 100) : 0;
  document.getElementById("stat-total").textContent    = total;
  document.getElementById("stat-owned").textContent    = owned;
  document.getElementById("stat-missing").textContent  = total - owned;
  document.getElementById("stat-pct").textContent      = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";

  // Important progress bar
  const impRows  = allRows.filter(r => r["_important"] === "1");
  const impOwned = impRows.filter(r => r["Ever Seen"] === "1").length;
  const impTotal = impRows.length;
  const impPct   = impTotal ? Math.round(impOwned / impTotal * 100) : 0;
  document.getElementById("progress-fill-imp").style.width = impPct + "%";
  document.getElementById("imp-progress-counts").textContent =
    impTotal > 0 ? `${impOwned} / ${impTotal} (${impPct}%)` : "No important uniques loaded";
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  try {
    const [masterResult, importantResult] = await Promise.allSettled([
      fetchCSV(MASTER_CSV),
      fetchCSV(IMPORTANT_CSV),
    ]);

    if (masterResult.status === "rejected") throw masterResult.reason;

    const masterRows = parseCSV(masterResult.value);

    // Build a map of important name -> source for O(1) lookup
    const importantMap = new Map(); // name -> source string
    if (importantResult.status === "fulfilled") {
      parseCSV(importantResult.value).forEach(r => {
        importantMap.set(r["Unique Name"], r["Source"] || "");
      });
    }

    // Merge important flag and source into each master row
    allRows = masterRows.map(r => ({
      ...r,
      _important: importantMap.has(r["Unique Name"]) ? "1" : "0",
      _source:    importantMap.get(r["Unique Name"]) || "",
    }));

    document.getElementById("status").style.display = "none";
    document.getElementById("table").style.display  = "table";
    document.getElementById("last-updated").textContent =
      "Last updated: " + new Date().toLocaleString();

    // Restore filter state saved before last auto-refresh
    restoreFilters();

    updateStats();
    renderTable();
  } catch (e) {
    document.getElementById("status").textContent =
      "Could not load guild_stash_master.csv. Make sure it exists in the repo root.";
    console.error(e);
  }
}

// ── Event listeners ───────────────────────────────────────
document.querySelectorAll("[data-have]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-have]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    filterHave = btn.dataset.have;
    renderTable();
  });
});

document.querySelectorAll("[data-imp]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-imp]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    filterImp = btn.dataset.imp;
    renderTable();
  });
});

document.querySelectorAll("th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    sortDir = (sortCol === col) ? sortDir * -1 : 1;
    sortCol = col;
    document.querySelectorAll("th").forEach(t => t.classList.remove("sorted"));
    th.classList.add("sorted");
    th.querySelector(".sort-arrow").textContent = sortDir === 1 ? "↑" : "↓";
    renderTable();
  });
});

document.getElementById("search").addEventListener("input", renderTable);

init();

// ── Filter state persistence (survives auto-refresh) ─────
function saveFilters() {
  sessionStorage.setItem("filterHave",  filterHave);
  sessionStorage.setItem("filterImp",   filterImp);
  sessionStorage.setItem("searchQuery", document.getElementById("search").value);
}

function restoreFilters() {
  const savedHave  = sessionStorage.getItem("filterHave");
  const savedImp   = sessionStorage.getItem("filterImp");
  const savedQuery = sessionStorage.getItem("searchQuery");

  if (savedHave !== null) {
    filterHave = savedHave;
    document.querySelectorAll("[data-have]").forEach(b => {
      b.classList.toggle("active", b.dataset.have === filterHave);
    });
  }
  if (savedImp !== null) {
    filterImp = savedImp;
    document.querySelectorAll("[data-imp]").forEach(b => {
      b.classList.toggle("active", b.dataset.imp === filterImp);
    });
  }
  if (savedQuery) {
    document.getElementById("search").value = savedQuery;
  }

  // Clear so a manual refresh (F5) starts fresh
  sessionStorage.removeItem("filterHave");
  sessionStorage.removeItem("filterImp");
  sessionStorage.removeItem("searchQuery");
}

// ── Auto-refresh on new commit ────────────────────────────
// Polls the GitHub API every 60s to check for new commits.
// If a new commit is detected, reloads the page to pull fresh CSV data.
//
// SETUP: update GITHUB_USER and GITHUB_REPO to match your repo.
const GITHUB_USER = "MecAtlantiss";
const GITHUB_REPO = "gsf-guild-stash";
const POLL_INTERVAL_MS = 60_000; // 60 seconds

let lastKnownSha = null;

async function getLatestCommitSha() {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?per_page=1`;
  const resp = await fetch(url, {
    headers: { "Accept": "application/vnd.github.v3+json" }
  });
  if (!resp.ok) throw new Error(`GitHub API error: ${resp.status}`);
  const data = await resp.json();
  return data[0]?.sha ?? null;
}

async function pollForUpdates() {
  try {
    const sha = await getLatestCommitSha();
    if (lastKnownSha === null) {
      // First poll — just record the current SHA, don't reload
      lastKnownSha = sha;
    } else if (sha && sha !== lastKnownSha) {
      // New commit detected — reload to fetch updated CSVs
      console.log(`New commit detected (${sha.slice(0, 7)}), reloading...`);
      saveFilters();
      location.reload();
    }
  } catch (e) {
    // Silently ignore API errors (rate limit, network blip, etc.)
    console.warn("Auto-refresh poll failed:", e.message);
  }
}

// Start polling after initial load
setTimeout(() => {
  pollForUpdates();
  setInterval(pollForUpdates, POLL_INTERVAL_MS);
}, 5000); // 5s delay so the initial page load settles first
</script>
</body>
</html>
